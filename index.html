<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page privée</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      cursor: pointer;
    }

    #content {
      display: none;
      margin-top: 20px;
      text-align: left;
    }
  </style>
</head>
<body>

<div id="box">
  <h2>Félicitations !</h2>

  <div id="login">
    <p>Entrez le mot de passe :</p>
    <input type="password" id="password" />
    <br>
    <button onclick="checkPassword()">OK</button>
  </div>

  <div id="content">
    <p>
      Pour trouver le dernier morceau de la charte, marchez 300 mètres vers l'azimuth 324°.
    </p>
  </div>
</div>

<script>
  function checkPassword() {
    const password = document.getElementById("password").value;

    if (password === "2358") {
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
    } else {
      alert("Mot de passe incorrect");
    }
  }
</script>

</body>
</html>
